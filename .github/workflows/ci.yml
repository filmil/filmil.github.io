name: Website CI

on:
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9 AM UTC

jobs:
  test-website:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install html5validator
        run: pip install html5validator

      - name: Validate HTML
        run: html5validator index.html

      - name: Install lychee Link Checker
        env:
          LYCHEE_VERSION: v0.13.0 # Specify a recent, stable version
        run: |
          wget https://github.com/lycheeverse/lychee/releases/download/${LYCHEE_VERSION}/lychee-${LYCHEE_VERSION}-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf lychee-${LYCHEE_VERSION}-x86_64-unknown-linux-gnu.tar.gz
          sudo mv lychee /usr/local/bin/

      - name: Check links
        run: lychee --verbose --exclude-mail --exclude "https://linkedin.com/in/placeholder" --exclude "https://github.com/placeholder" --exclude "http://re.filmar.us/placeholder-article-1" --exclude "http://re.filmar.us/placeholder-article-2" --exclude "http://re.filmar.us/placeholder-article-3" --exclude "https://hdlfactory.com/placeholder-article-1" --exclude "https://hdlfactory.com/placeholder-article-2" --exclude "https://hdlfactory.com/placeholder-article-3" ./**/*.html
